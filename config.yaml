{
  "providers": {
    "codex": {
      "enabled": true,
      "binary_env": "CODEX_BIN",
      "default_model": null
    },
    "openai": {
      "enabled": true,
      "api_key_env": "OPENAI_API_KEY",
      "base_url": "https://api.openai.com/v1/chat/completions",
      "default_model": "gpt-4o-mini"
    },
    "google": {
      "enabled": true,
      "api_key_env": "GOOGLE_API_KEY",
      "base_url": "https://generativelanguage.googleapis.com/v1beta",
      "default_model": "gemini-2.0-flash"
    },
    "local": {
      "enabled": true,
      "api_key_env": null,
      "base_url": "http://localhost:11434/v1/chat/completions",
      "default_model": "llama3.1"
    }
  },
  "routing": {
    "router":       {"low": "local", "medium": "local", "high": "local"},
    "listener":     {"low": "local", "medium": "local", "high": "local"},
    "assembler":    {"low": "local", "medium": "local", "high": "local"},
    "elicitor":     {"low": "local", "medium": "local", "high": "local"},
    "writer":       {"low": "local", "medium": "local", "high": "local"},
    "skeptic":      {"low": "local", "medium": "local", "high": "local"},
    "interlocutor": {"low": "local", "medium": "local", "high": "local"},
    "dreamer":      {"low": "local", "medium": "local", "high": "local"}
  },
  "heuristic": {
    "thresholds": {"skip": 3, "lightweight": 6},
    "affect_terms": [
      "angry", "sad", "anxious", "excited", "afraid", "frustrated",
      "happy", "proud", "surprised", "confused", "hurt", "nervous",
      "grateful", "relieved", "disappointed", "interesting", "weird",
      "strange", "awful", "amazing", "terrible", "wonderful",
      "great", "fantastic", "incredible", "beautiful", "lovely",
      "loving", "loved", "love", "enjoy", "enjoyed", "enjoying",
      "hate", "hated", "miss", "missing", "fun", "tired",
      "nice", "rough", "tough", "hard",
      "exhausted", "drained", "overwhelmed", "stressed", "annoyed",
      "bored", "busy", "sick", "lonely", "proud", "cozy", "cold", "warm"
    ]
  },
  "backup": {
    "destination_dir": "backups",
    "encrypt_by_default": false,
    "recipient_env": "LISAN_BACKUP_RECIPIENT",
    "identity_env": "LISAN_BACKUP_IDENTITY",
    "age_binary_env": "AGE_BIN"
  },
  "retrieval": {
    "fusion": {
      "enabled": true,
      "method": "rrf",
      "rrf_k": 60,
      "per_layer_limit": 30,
      "fused_limit": 20
    }
  }
}
