{
  "providers": {
    "codex": {
      "enabled": true,
      "binary_env": "CODEX_BIN",
      "default_model": null
    },
    "openai": {
      "enabled": true,
      "api_key_env": "OPENAI_API_KEY",
      "base_url": "https://api.openai.com/v1/chat/completions",
      "default_model": "gpt-4o-mini"
    },
    "google": {
      "enabled": true,
      "api_key_env": "GOOGLE_API_KEY",
      "base_url": "https://generativelanguage.googleapis.com/v1beta",
      "default_model": "gemini-2.0-flash"
    },
    "local": {
      "enabled": true,
      "api_key_env": null,
      "base_url": "http://127.0.0.1:8080/v1/chat/completions",
      "default_model": null
    },
    "openrouter": {
      "enabled": true,
      "api_key_env": "OPENROUTER_API_KEY",
      "base_url": "https://openrouter.ai/api/v1/chat/completions",
      "default_model": "mistralai/mistral-nemo"
    }
  },
  "routing": {
    "router": {
      "low": "openrouter",
      "medium": "openrouter",
      "high": "openrouter"
    },
    "listener": {
      "low": "openrouter",
      "medium": "openrouter",
      "high": "openrouter"
    },
    "assembler": {
      "low": "openrouter",
      "medium": "openrouter",
      "high": "openrouter"
    },
    "elicitor": {
      "low": "openrouter",
      "medium": "openrouter",
      "high": "openrouter"
    },
    "writer": {
      "low": "openrouter",
      "medium": "openrouter",
      "high": "openrouter"
    },
    "skeptic": {
      "low": "openrouter",
      "medium": "openrouter",
      "high": "openrouter"
    },
    "interlocutor": {
      "low": "openrouter",
      "medium": "openrouter",
      "high": "openrouter"
    },
    "dreamer": {
      "low": "openrouter",
      "medium": "openrouter",
      "high": "openrouter"
    }
  },
  "heuristic": {
    "thresholds": {
      "skip": 3,
      "lightweight": 6
    },
    "affect_terms": [
      "angry",
      "sad",
      "anxious",
      "excited",
      "afraid",
      "frustrated",
      "happy",
      "proud",
      "surprised",
      "confused",
      "hurt",
      "nervous",
      "grateful",
      "relieved",
      "disappointed",
      "interesting",
      "weird",
      "strange",
      "awful",
      "amazing",
      "terrible",
      "wonderful",
      "great",
      "fantastic",
      "incredible",
      "beautiful",
      "lovely",
      "loving",
      "loved",
      "love",
      "enjoy",
      "enjoyed",
      "enjoying",
      "hate",
      "hated",
      "miss",
      "missing",
      "fun",
      "tired",
      "nice",
      "rough",
      "tough",
      "hard",
      "exhausted",
      "drained",
      "overwhelmed",
      "stressed",
      "annoyed",
      "bored",
      "busy",
      "sick",
      "lonely",
      "cozy",
      "cold",
      "warm"
    ]
  },
  "ingest": {
    "max_file_size_bytes": 5242880,
    "text_preview_chars": 4000,
    "skip_if_inside_vault": true
  },
  "backup": {
    "destination_dir": "backups",
    "encrypt_by_default": false,
    "recipient_env": "LISAN_BACKUP_RECIPIENT",
    "identity_env": "LISAN_BACKUP_IDENTITY",
    "age_binary_env": "AGE_BIN"
  },
  "retrieval": {
    "fusion": {
      "enabled": true,
      "method": "rrf",
      "rrf_k": 60,
      "per_layer_limit": 30,
      "fused_limit": 20
    },
    "embeddings": {
      "mode": "auto",
      "provider": "fastembed",
      "model": "BAAI/bge-small-en-v1.5",
      "dimensions": 384,
      "cache_dir": null,
      "query_prefix": "Represent this sentence for searching relevant passages: ",
      "passage_prefix": "",
      "base_url": "http://127.0.0.1:8080",
      "api_key_env": null,
      "timeout_seconds": 30,
      "batch_size": 64,
      "unreachable_policy": "skip",
      "hash_dimensions": 32
    }
  }
}