{
  "providers": {
    "local": {
      "enabled": true,
      "api_key_env": null,
      "base_url": "http://127.0.0.1:8080/v1/chat/completions",
      "default_model": null
    },
    "codex": {
      "enabled": true,
      "binary_env": "CODEX_BIN",
      "default_model": null
    },
    "openai": {
      "enabled": false,
      "api_key_env": "OPENAI_API_KEY",
      "base_url": "https://api.openai.com/v1/chat/completions",
      "default_model": "gpt-4o-mini"
    },
    "google": {
      "enabled": false,
      "api_key_env": "GOOGLE_API_KEY",
      "base_url": "https://generativelanguage.googleapis.com/v1beta",
      "default_model": "gemini-2.0-flash"
    },
    "openrouter": {
      "enabled": false,
      "api_key_env": "OPENROUTER_API_KEY",
      "base_url": "https://openrouter.ai/api/v1/chat/completions",
      "default_model": "mistralai/mistral-nemo"
    }
  },
  "routing": {
    "__comment_routing_format": "Agent routing: each agent maps low/medium/high significance turns to provider names from the providers block.",
    "__comment_routing_significance": "Significance is determined by the listener's heuristic score per turn.",
    "__comment_routing_strategy": "Route cheap or mechanical agents to a local or low-cost model to save tokens; reserve stronger frontier models for agents that need more judgment.",
    "__comment_routing_listener": "Recommended tiering: listener, assembler, and router are mostly mechanical classification with small context, so they are safe on a local/cheap model at all significance levels.",
    "__comment_routing_elicitor": "Elicitor asks clarifying questions and needs moderate judgment. A common setup is local for low significance and a frontier model for medium/high.",
    "__comment_routing_writer": "Writer does the heaviest narrative synthesis. A common setup is local for low-significance turns and a frontier model for medium/high.",
    "__comment_routing_reviewers": "Skeptic and Interlocutor are user-visible judgment layers. Many users reserve a frontier model for medium/high on those agents.",
    "__comment_routing_background": "Dreamer and Analyst are offline/background passes and can usually stay on a local or cheap model.",
    "__comment_routing_default": "The shipped default routes everything to local so Lisan works out of the box with any OpenAI-compatible local server. Customize per your available models and budget.",
    "__comment_routing_tier_example": "Example tiering with codex: writer={low:local,medium:codex,high:codex}, skeptic={low:local,medium:codex,high:codex}, interlocutor={low:local,medium:codex,high:codex}.",
    "router": { "low": "local", "medium": "local", "high": "local" },
    "listener": { "low": "local", "medium": "local", "high": "local" },
    "assembler": { "low": "local", "medium": "local", "high": "local" },
    "elicitor": { "low": "local", "medium": "local", "high": "local" },
    "writer": { "low": "local", "medium": "local", "high": "local" },
    "skeptic": { "low": "local", "medium": "local", "high": "local" },
    "interlocutor": { "low": "local", "medium": "local", "high": "local" },
    "dreamer": { "low": "local", "medium": "local", "high": "local" },
    "advice": { "low": "local", "medium": "local", "high": "local" },
    "analyst": { "low": "local", "medium": "local", "high": "local" }
  },
  "heuristic": {
    "thresholds": {
      "skip": 3,
      "lightweight": 6
    },
    "high_stakes_terms": null,
    "__comment_high_stakes_terms": "Vault-local primer/high-stakes.yaml takes priority over this. If set here, these terms score +4 each, pushing turns to full processing. Personal — add terms that signal important domains in your life. Default: empty (no universal high-stakes vocabulary).",
    "biographical_terms": null,
    "__comment_biographical_terms": "Override the default family/life-event terms used for biographical density detection. null = use built-in defaults (mom, dad, wife, etc.).",
    "affect_terms": null,
    "__comment_affect_terms": "Override the default emotion vocabulary. null = use built-in defaults. Customize to match your communication style.",
    "__comment_affect_terms_defaults": "The built-in defaults keep clearly emotional words and omit broad adjectives that often describe ordinary non-emotional situations.",
    "__comment_heuristic_config_format": "This example file stays valid JSON because Lisan's config loader parses JSON. The __comment_* keys are documentation only and are ignored by the runtime."
  },
  "ingest": {
    "max_file_size_bytes": 5242880,
    "text_preview_chars": 4000,
    "skip_if_inside_vault": true
  },
  "backup": {
    "destination_dir": "backups",
    "encrypt_by_default": false,
    "recipient_env": "LISAN_BACKUP_RECIPIENT",
    "identity_env": "LISAN_BACKUP_IDENTITY",
    "age_binary_env": "AGE_BIN"
  },
  "retrieval": {
    "fusion": {
      "enabled": true,
      "method": "rrf",
      "rrf_k": 60,
      "per_layer_limit": 30,
      "fused_limit": 20
    },
    "embeddings": {
      "mode": "auto",
      "provider": "fastembed",
      "model": "BAAI/bge-small-en-v1.5",
      "dimensions": 384,
      "cache_dir": null,
      "query_prefix": "Represent this sentence for searching relevant passages: ",
      "passage_prefix": "",
      "base_url": "http://127.0.0.1:8080",
      "api_key_env": null,
      "timeout_seconds": 30,
      "batch_size": 64,
      "unreachable_policy": "skip",
      "hash_dimensions": 32
    }
  }
}
